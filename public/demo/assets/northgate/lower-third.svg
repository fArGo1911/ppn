<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 200" role="img" aria-label="Northgate lower-third offer strip (fictional demo)">
  <defs>
    <linearGradient id="strip" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0b1220"/><stop offset="1" stop-color="#101a30"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#b45309"/></linearGradient>
  </defs>
  <rect width="1600" height="200" rx="16" fill="url(#strip)"/>
  <rect x="0" y="0" width="14" height="200" fill="url(#amber)"/>
  <!-- logo badge -->
  <g transform="translate(110 100)">
    <circle r="62" fill="#0b1220" stroke="url(#amber)" stroke-width="4"/>
    <g fill="url(#amber)"><path d="M0 -34 L10 -6 L0 2 L-10 -6 Z"/><path d="M0 2 L10 -6 L40 0 L10 8 Z" opacity="0.85"/><path d="M0 2 L-10 -6 L-40 0 L-10 8 Z" opacity="0.85"/></g>
    <path d="M-40 24 V4 a40 40 0 0 1 80 0 V24" fill="none" stroke="url(#amber)" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text x="210" y="92" font-family="Georgia, serif" font-size="40" font-weight="700" letter-spacing="2" fill="#f4f0e6">Northgate Brewing Co.</text>
  <text x="210" y="140" font-family="Arial, sans-serif" font-size="30" fill="#fbbf24">🎁 20% off the kitchen for every team</text>
  <text x="1560" y="120" text-anchor="end" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8">Quiz Night · The Anchor</text>
</svg>
