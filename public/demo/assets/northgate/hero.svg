<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Northgate Quiz Nights campaign background (fictional demo)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1830"/>
      <stop offset="0.6" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#080d18"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.6">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <!-- faint concentric arches (the 'gate') -->
  <g fill="none" stroke="#f59e0b" stroke-opacity="0.12" stroke-width="3">
    <path d="M1180 760 V470 a280 280 0 0 1 560 0 V760"/>
    <path d="M1260 760 V510 a200 200 0 0 1 400 0 V760"/>
    <path d="M1340 760 V548 a120 120 0 0 1 240 0 V760"/>
  </g>
  <!-- compass north-star top-right -->
  <g transform="translate(1300 250)" fill="url(#amber)" opacity="0.9">
    <path d="M0 -120 L22 -22 L0 0 L-22 -22 Z"/>
    <path d="M0 0 L22 -22 L120 0 L22 22 Z" opacity="0.8"/>
    <path d="M0 0 L-22 -22 L-120 0 L-22 22 Z" opacity="0.8"/>
    <path d="M0 0 L22 22 L0 120 L-22 22 Z" opacity="0.8"/>
  </g>
  <!-- faint watermark wordmark, low so page text sits above -->
  <text x="90" y="820" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="700" letter-spacing="6" fill="#ffffff" fill-opacity="0.05">NORTHGATE</text>
  <!-- subtle hop dots -->
  <g fill="#f59e0b" fill-opacity="0.18">
    <circle cx="150" cy="160" r="6"/><circle cx="210" cy="120" r="4"/><circle cx="120" cy="220" r="4"/>
  </g>
</svg>
