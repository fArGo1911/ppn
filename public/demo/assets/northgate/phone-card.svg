<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" aria-label="Northgate phone sponsor card (fictional demo)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101a30"/><stop offset="1" stop-color="#0a0f1a"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#b45309"/></linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.2" r="0.7"><stop offset="0" stop-color="#f59e0b" stop-opacity="0.25"/><stop offset="1" stop-color="#f59e0b" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#glow)"/>
  <rect x="36" y="36" width="1008" height="1278" rx="40" fill="none" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="3"/>
  <!-- logo mark -->
  <g transform="translate(540 300)">
    <circle r="120" fill="#0b1220" stroke="url(#amber)" stroke-width="6"/>
    <path d="M-70 36 V0 a70 70 0 0 1 140 0 V36" fill="none" stroke="url(#amber)" stroke-width="7" stroke-linecap="round"/>
    <g fill="url(#amber)"><path d="M0 -56 L16 -10 L0 4 L-16 -10 Z"/><path d="M0 4 L16 -10 L70 0 L16 14 Z" opacity="0.85"/><path d="M0 4 L-16 -10 L-70 0 L-16 14 Z" opacity="0.85"/></g>
  </g>
  <text x="540" y="520" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" letter-spacing="4" fill="#f4f0e6">NORTHGATE BREWING CO.</text>
  <text x="540" y="582" text-anchor="middle" font-family="Georgia, serif" font-size="34" fill="#94a3b8">Quiz Night · The Anchor</text>
  <!-- offer ribbon -->
  <rect x="140" y="700" width="800" height="150" rx="24" fill="#f59e0b" fill-opacity="0.14" stroke="url(#amber)" stroke-width="3"/>
  <text x="540" y="772" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#fbbf24">TONIGHT'S REWARD</text>
  <text x="540" y="818" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#e2e8f0">20% off the kitchen for every team</text>
  <text x="540" y="1180" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#94a3b8">Please drink responsibly · 18+ · Non-alcohol prize</text>
  <text x="540" y="1260" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#64748b">⚡ powered by PubPlay Network</text>
</svg>
