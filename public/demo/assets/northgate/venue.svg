<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="The Anchor pub at night (fictional demo illustration)">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a1020"/><stop offset="1" stop-color="#13203a"/></linearGradient>
    <radialGradient id="lamp" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#f59e0b" stop-opacity="0.55"/><stop offset="1" stop-color="#f59e0b" stop-opacity="0"/></radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#b45309"/></linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <!-- ground -->
  <rect y="720" width="1600" height="180" fill="#0a0f1a"/>
  <!-- pub facade -->
  <rect x="430" y="300" width="740" height="420" fill="#172338"/>
  <polygon points="410,300 800,170 1190,300" fill="#1f2d46"/>
  <!-- warm windows -->
  <g fill="#f59e0b" fill-opacity="0.5">
    <rect x="490" y="420" width="120" height="160" rx="8"/><rect x="740" y="420" width="120" height="160" rx="8"/><rect x="990" y="420" width="120" height="160" rx="8"/>
  </g>
  <!-- door -->
  <path d="M730 720 V560 a70 70 0 0 1 140 0 V720" fill="#f59e0b" fill-opacity="0.35" stroke="url(#amber)" stroke-width="4"/>
  <!-- hanging sign -->
  <ellipse cx="1280" cy="430" rx="170" ry="120" fill="url(#lamp)"/>
  <rect x="1180" y="360" width="200" height="130" rx="14" fill="#0b1220" stroke="url(#amber)" stroke-width="5"/>
  <text x="1280" y="415" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#fbbf24">THE</text>
  <text x="1280" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="40" font-weight="700" fill="#f4f0e6">ANCHOR</text>
  <!-- anchor motif -->
  <g transform="translate(1280 300)" stroke="url(#amber)" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="0" y1="-34" x2="0" y2="14"/><circle cx="0" cy="-40" r="7"/><line x1="-16" y1="-22" x2="16" y2="-22"/>
    <path d="M-22 0 a22 22 0 0 0 44 0"/>
  </g>
  <text x="80" y="820" font-family="Georgia, serif" font-size="46" font-weight="700" fill="#e2e8f0" fill-opacity="0.85">The Anchor · Quiz Night</text>
</svg>
